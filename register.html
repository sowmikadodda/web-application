<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="register-body">
<div class="register-container">
    <div class="register-card">
        <h2>Create New Account</h2>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <div class="form-row">
                <div class="input-group">
                    <i class="fas fa-user icon-inside"></i>
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope icon-inside"></i>
                    <input type="email" name="email" placeholder="Email ID" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <i class="fas fa-lock icon-inside"></i>
                    <input type="password" name="password" id="create-password" placeholder="Password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('create-password', this)"></i>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock icon-inside"></i>
                    <input type="password" name="confirm_password" id="confirm-password" placeholder="Confirm Password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('confirm-password', this)"></i>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <i class="fas fa-id-card icon-inside"></i>
                    <input type="text" name="full_name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-phone icon-inside"></i>
                    <input type="tel" name="mobile" placeholder="Mobile Number" required>
                </div>
            </div>

            <div class="input-group full-width">
                <label class="dob-label">Date of Birth:</label>
                <div class="date-row">
                    <input type="number" name="day" placeholder="DD" min="1" max="31" required>
                    <input type="number" name="month" placeholder="MM" min="1" max="12" required>
                    <input type="number" name="year" placeholder="YYYY" min="1950" max="2010" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group gender-group">
                    <i class="fas fa-venus-mars icon-inside"></i>
                    <select name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fas fa-map-marker-alt icon-inside"></i>
                    <input type="text" name="location" placeholder="Address / Location" required>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-signup">CREATE ACCOUNT</button>
                <button type="button" class="btn btn-signin" onclick="window.location.href='/login'">ALREADY HAVE ACCOUNT</button>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePasswordVisibility(fieldId, iconElement) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            iconElement.classList.remove('fa-eye');
            iconElement.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            iconElement.classList.remove('fa-eye-slash');
            iconElement.classList.add('fa-eye');
        }
    }
</script>
</body>
</html>
